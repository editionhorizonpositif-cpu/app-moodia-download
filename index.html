<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Moodia · Téléchargements officiels</title>
    <meta name="description" content="Téléchargez Moodia pour Windows, macOS, Android, iOS. Application de bien-être intuitive, gratuite et respectueuse.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(125deg, #f6fbf8 0%, #eaf4ef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 1300px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .logo {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(115deg, #1e4b2e, #2d8a55);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }
        .tagline {
            font-size: 1.2rem;
            color: #2c6e46;
            margin-top: 0.5rem;
            font-weight: 500;
        }
        .platforms {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
        }
        .platform-card {
            background: white;
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            text-align: center;
            width: 220px;
            transition: all 0.25s;
            text-decoration: none;
            color: #1f5437;
            border: 1px solid #e0efe8;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
        }
        .platform-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.08);
            border-color: #9accb2;
        }
        .platform-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }
        .platform-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0.5rem 0;
        }
        .platform-status {
            font-size: 0.8rem;
            color: #5f8b74;
            background: #f0f7f3;
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
        }
        .platform-card.disabled {
            opacity: 0.6;
            cursor: not-allowed;
            filter: grayscale(0.1);
        }
        .platform-card.disabled:hover {
            transform: none;
            border-color: #e0efe8;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            font-size: 0.75rem;
            color: #6f997f;
            border-top: 1px solid #d8e8e0;
        }
        @media (max-width: 700px) {
            body { padding: 1.5rem; }
            h1 { font-size: 2rem; }
            .platform-card { width: 160px; padding: 1.2rem; }
            .platform-icon { font-size: 2.5rem; }
            .platform-name { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">🌿</div>
        <h1>Moodia</h1>
        <div class="tagline">Bien-être accessible à tous, sur tous vos écrans</div>
    </div>

    <div class="platforms">
        <!-- Windows (lien vers download.html) -->
        <a href="download.html" class="platform-card">
            <div class="platform-icon">
                <svg width="48" height="48" viewBox="0 0 23 23" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="23" height="23" rx="4" fill="#0078D4"/>
                    <path d="M0 11.5L11.5 0v4.6L3.2 11.5 11.5 18.4v4.6L0 11.5z" fill="white"/>
                    <path d="M12.5 0L23 11.5 12.5 23v-4.6l8.3-6.9-8.3-6.9V0z" fill="white" fill-opacity="0.8"/>
                </svg>
            </div>
            <div class="platform-name">Windows</div>
            <div class="platform-status">Version 1.0.0</div>
        </a>

        <!-- macOS (bientôt) -->
        <div class="platform-card disabled">
            <div class="platform-icon">🍎</div>
            <div class="platform-name">macOS</div>
            <div class="platform-status">Bientôt disponible</div>
        </div>

        <!-- Android (bientôt) -->
        <div class="platform-card disabled">
            <div class="platform-icon">🤖</div>
            <div class="platform-name">Android</div>
            <div class="platform-status">Bientôt disponible</div>
        </div>

        <!-- iOS (bientôt) -->
        <div class="platform-card disabled">
            <div class="platform-icon">📱</div>
            <div class="platform-name">iOS</div>
            <div class="platform-status">Bientôt disponible</div>
        </div>

        <!-- Linux (optionnel) -->
        <div class="platform-card disabled">
            <div class="platform-icon">🐧</div>
            <div class="platform-name">Linux</div>
            <div class="platform-status">En projet</div>
        </div>
    </div>

    <footer>
        © 2026 Horizon Positif, Inc. · Téléchargements sécurisés via GitHub Releases
    </footer>
</div>
</body>
</html>
