<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moodia · Téléchargements</title>
    <meta name="description" content="Téléchargez Moodia sur Windows, macOS, Android et bientôt iOS.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #e9f3ee 0%, #dce9e2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            max-width: 1000px;
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-4px); }
        .header {
            background: linear-gradient(125deg, #1a4630, #236b46);
            padding: 2rem;
            text-align: center;
            color: white;
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .platform-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            padding: 2rem;
        }
        .platform-card {
            background: #f8fcf9;
            border-radius: 1.5rem;
            padding: 1.5rem;
            text-align: center;
            width: 180px;
            border: 1px solid #e0efe8;
            transition: all 0.2s;
            text-decoration: none;
            color: #1f5437;
        }
        .platform-card:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 20px rgba(0,0,0,0.05);
            border-color: #9accb2;
        }
        .platform-icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .platform-name { font-weight: 700; font-size: 1.2rem; margin: 0.5rem 0; }
        .platform-desc { font-size: 0.75rem; color: #5f8b74; }
        .footer {
            background: #f0f7f3;
            padding: 1rem;
            text-align: center;
            font-size: 0.75rem;
            color: #466a51;
        }
        @media (max-width: 700px) {
            .platform-card { width: 140px; padding: 1rem; }
            .platform-icon { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>📥 Télécharger Moodia</h1>
        <p>Disponible sur toutes vos plateformes</p>
    </div>
    <div class="platform-grid">
        <!-- Windows -->
        <a href="https://github.com/editionhorizonpositif-cpu/moodia-download/releases/download/v1.0.0/Moodia_Setup_1.0.0.exe" class="platform-card" download>
            <div class="platform-icon">🪟</div>
            <div class="platform-name">Windows</div>
            <div class="platform-desc">10 / 11 (64-bit)</div>
        </a>
        <!-- macOS (à venir) -->
        <div class="platform-card" style="opacity:0.6; cursor:not-allowed;">
            <div class="platform-icon">🍎</div>
            <div class="platform-name">macOS</div>
            <div class="platform-desc">Bientôt disponible</div>
        </div>
        <!-- Android (APK) -->
        <a href="#" class="platform-card" style="opacity:0.6; cursor:not-allowed;">
            <div class="platform-icon">🤖</div>
            <div class="platform-name">Android</div>
            <div class="platform-desc">APK – bientôt</div>
        </a>
        <!-- iOS (à venir) -->
        <div class="platform-card" style="opacity:0.6; cursor:not-allowed;">
            <div class="platform-icon">📱</div>
            <div class="platform-name">iOS</div>
            <div class="platform-desc">Prochainement</div>
        </div>
    </div>
    <div class="footer">
        © 2026 Moodia – Téléchargements sécurisés via GitHub Releases
    </div>
</div>
<script>
    // Détection automatique de l'OS pour Windows uniquement pour l'instant
    const userAgent = navigator.userAgent.toLowerCase();
    if (userAgent.includes('win')) {
        // Optionnel : mettre en surbrillance la carte Windows
        const windowsCard = document.querySelector('a[href*="Moodia_Setup"]');
        if (windowsCard) windowsCard.style.border = '2px solid #1f9a57';
    }
</script>
</body>
</html>
